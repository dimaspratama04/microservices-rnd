version: '3.8'

services:
  postgres:
    image: postgres:15
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init-dbs.sql:/docker-entrypoint-initdb.d/init-dbs.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U user"]
      interval: 5s
      timeout: 5s
      retries: 5

  rabbitmq:
    image: rabbitmq:3-management
    ports:
      - "5672:5672"
      - "15672:15672"
    healthcheck:
      test: rabbitmq-diagnostics -q ping
      interval: 5s
      timeout: 5s
      retries: 5

  order-service:
    build:
      context: ./order-service
    ports:
      - "8080:8080"
    environment:
      - DB_URL=postgres://user:password@postgres:5432/order_db?sslmode=disable
      - PRODUCT_SERVICE_URL=http://product-service:8081
      - PAYMENT_SERVICE_URL=http://payment-service:8082
    depends_on:
      postgres:
        condition: service_healthy
      product-service:
        condition: service_started
      payment-service:
        condition: service_started

  product-service:
    build:
      context: ./product-service
    ports:
      - "8081:8081"
    environment:
      - SPRING_DATASOURCE_URL=jdbc:postgresql://postgres:5432/product_db
      - SPRING_DATASOURCE_USERNAME=user
      - SPRING_DATASOURCE_PASSWORD=password
    depends_on:
      postgres:
        condition: service_healthy

  payment-service:
    build:
      context: ./payment-service
    ports:
      - "8082:8082"
    environment:
      - DB_URL=postgres://user:password@postgres:5432/payment_db
      - RABBITMQ_URL=amqp://guest:guest@rabbitmq:5672
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy

  notification-service:
    build:
      context: ./notification-service
    ports:
      - "8083:3000"
    environment:
      - DATABASE_URL=postgres://user:password@postgres:5432/notification_db
      - RABBITMQ_URL=amqp://guest:guest@rabbitmq:5672
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy

volumes:
  postgres_data:
