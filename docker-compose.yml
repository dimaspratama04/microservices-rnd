services:
  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init-dbs.sql:/docker-entrypoint-initdb.d/init-dbs.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U user"]
      interval: 5s
      timeout: 5s
      retries: 5

  rabbitmq:
    image: rabbitmq:3-management
    ports:
      - "5672:5672"
      - "15672:15672"
    healthcheck:
      test: rabbitmq-diagnostics -q ping
      interval: 5s
      timeout: 5s
      retries: 5

  order-service:
    build:
      context: ./order-service
    ports:
      - "8080:8080"
    environment:
      - DB_URL=postgres://user:password@postgres:5432/order_db?sslmode=disable
      - PRODUCT_SERVICE_URL=http://product-service:8081
      - PAYMENT_SERVICE_URL=http://payment-service:8082
      - OTEL_EXPORTER_OTLP_ENDPOINT=http://jaeger:4318
      - OTEL_SERVICE_NAME=order-service
    depends_on:
      postgres:
        condition: service_healthy
      product-service:
        condition: service_started
      payment-service:
        condition: service_started
      jaeger:
        condition: service_started

  product-service:
    build:
      context: ./product-service
    ports:
      - "8081:8081"
    environment:
      - SPRING_DATASOURCE_URL=jdbc:postgresql://postgres:5432/product_db
      - SPRING_DATASOURCE_USERNAME=user
      - SPRING_DATASOURCE_PASSWORD=password
      - MANAGEMENT_OTLP_TRACING_ENDPOINT=http://jaeger:4318/v1/traces
      - SPRING_APPLICATION_NAME=product-service
      - OTEL_SERVICE_NAME=product-service
    depends_on:
      postgres:
        condition: service_healthy
      jaeger:
        condition: service_started

  payment-service:
    build:
      context: ./payment-service
    ports:
      - "8082:8082"
    environment:
      - DB_URL=postgres://user:password@postgres:5432/payment_db
      - RABBITMQ_URL=amqp://guest:guest@rabbitmq:5672
      - ORDER_SERVICE_URL=http://order-service:8080
      - PRODUCT_SERVICE_URL=http://product-service:8081
      - OTEL_EXPORTER_OTLP_ENDPOINT=http://jaeger:4318
      - OTEL_SERVICE_NAME=payment-service
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      jaeger:
        condition: service_started

  notification-service:
    build:
      context: ./notification-service
    ports:
      - "8083:8080"
    environment:
      - SPRING_RABBITMQ_HOST=rabbitmq
      - SPRING_RABBITMQ_PORT=5672
      - SPRING_RABBITMQ_USERNAME=guest
      - SPRING_RABBITMQ_PASSWORD=guest
      - MANAGEMENT_OTLP_TRACING_ENDPOINT=http://jaeger:4318/v1/traces
      - SPRING_APPLICATION_NAME=notification-service
      - OTEL_SERVICE_NAME=notification-service
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      jaeger:
        condition: service_started

  jaeger:
    image: jaegertracing/all-in-one:latest
    command: ["--query.ui-config", "/etc/jaeger/ui-config.json"]
    environment:
      - COLLECTOR_OTLP_ENABLED=true
    volumes:
      - ./jaeger-ui.json:/etc/jaeger/ui-config.json:ro
    ports:
      - "16686:16686" # UI
      - "4317:4317" # OTLP gRPC
      - "4318:4318" # OTLP HTTP

volumes:
  postgres_data:
